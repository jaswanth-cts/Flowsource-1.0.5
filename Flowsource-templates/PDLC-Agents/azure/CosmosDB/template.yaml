apiVersion: scaffolder.backstage.io/v1beta3
kind: Template
metadata:
  name: create-pdlc-azure-cosmosdb-template
  title: Create PDLC Azure CosmosDB Template
  description: Create PDLC Azure CosmosDB Template
  tags:
    - pdlc
    - azure
spec:
  owner: group:catalog-admin
  type: website
  parameters:
    - title: Provide some information to create PDLC Azure CosmosDB component
      required:
        - name
        - owner
      properties:
        name: 
          title: Component Name
          type: string
          description: PDLC component
        owner:
          title: Owner
          type: string
          description: Owner of the component
          ui:field: OwnerPicker
          ui:options:
            allowedKinds:
            - Group
    - title: Infra specific information
      required:
        - subscriptionId
        - resourceGroupName
        - resourceGroupLocation
        - cosmosdbClusterName
        - vnetName
        - subnetName
        - managedIdentity
        - pwd
      properties:
        subscriptionId:
          title: Subscription ID
          type: string
          description: Azure Subscription ID
        resourceGroupName:
          title: Resource Group Name
          type: string
          description: Azure Resource Group Name
        resourceGroupLocation:
          title: Resource Group Location
          type: string
          description: Azure Resource Group Location
        cosmosdbClusterName:
          title: CosmosDB Cluster Name
          type: string
          description: Azure CosmosDB Cluster Name
        vnetName:
          title: VNet Name
          type: string
          description: Azure VNet Name
        subnetName:
          title: Subnet Name
          type: string
          description: Azure Subnet Name
        managedIdentity:
          title: Managed Identity
          type: string
          description: Azure Managed Identity
        pwd:
          title: Password
          type: string
          description: Password for the Managed Identity              
        
    - title: Choose a location
      required:
        - repoUrl 
        - branch
        # -----------------Uncomment the below lines for the case where repository already exists---------------
        # - title
        # - description
      properties:
        repoUrl:
          title: Repository Location
          type: string
          ui:field: RepoUrlPicker
          ui:options:
            allowedHosts:
              - github.com        
        branch:
          title: Branch
          type: string
          default: main
          description: Git branch to use (default is "main")
        # -----------------Uncomment the below lines for the case where repository already exists---------------
        # -----------------This will add title and description to the pull request-----------------
        # title:
        #   title: Title
        #   type: string
        #   description: Title of the pull request
        # description:
        #   title: Description
        #   type: string
        #   description: Description of the pull request

  steps:
    - id: template
      name: Fetch Skeleton + Template
      action: fetch:template
      input:
        url: ./skeleton
        values:
          name: ${{ parameters.name }}
          owner: ${{ parameters.owner }}
          destination: ${{ parameters.repoUrl | parseRepoUrl }}
          subscriptionId: ${{ parameters.subscriptionId }}
          resourceGroupName: ${{ parameters.resourceGroupName }}
          resourceGroupLocation: ${{ parameters.resourceGroupLocation }}
          cosmosdbClusterName: ${{ parameters.cosmosdbClusterName }}
          vnetName: ${{ parameters.vnetName }}
          subnetName: ${{ parameters.subnetName }}
          managedIdentity: ${{ parameters.managedIdentity }}
          pwd: ${{ parameters.pwd }}
    # -----------------Comment the below lines for the case where repository already exists---------------
    - id: publish
      name: Publish
      action: publish:github
      input:
        allowedHosts: ["github.com"]
        repoUrl: ${{ parameters.repoUrl }}
        defaultBranch: ${{ parameters.branch }}
    # -----------------Uncomment the below lines for the case where repository already exists---------------
    # - id: publish
    #   name: Publish
    #   action: publish:github:pull-request
    #   input:
    #     allowedHosts: ["github.com"]
    #     repoUrl: ${{ parameters.repoUrl }}
    #     branchName: ${{ parameters.branch }}
    #     title: ${{ parameters.title }}
    #     description: ${{ parameters.description }}
    
  output:
    links:
      - title: Repository
        url: ${{ steps.publish.output.remoteUrl }}
      - title: Open in catalog
        icon: catalog
        entityRef: ${{ steps.register.output.entityRef }}
