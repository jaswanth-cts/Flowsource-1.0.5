apiVersion: scaffolder.backstage.io/v1beta3
kind: Template
metadata:
  name: aws-git-master-pipeline-template
  title: AWS Master Pipeline Using GitHub
  description: Create a AWS master pipeline using GitHub repository
  tags:
  - aws-cicd
spec:
  owner: group:catalog-admin
  type: service

  parameters:
  - title: Provide some simple information
    required:
    - component_id
    - default_branch
    - regionName
    - codebuild_service_role_arn
    - codepipeline_service_role_arn
    - s3_bucket
    - owner

    properties:
      component_id:
        title: Name
        type: string
        description: Unique name of the component.
        ui:field: EntityNamePicker
      default_branch:
        title: Default Branch
        type: string
        description: Default branch for the repository.
      regionName:
        title: Region Name
        type: string
        description: AWS region to use.
      codebuild_service_role_arn:
        title: CodeBuild Service Role ARN
        type: string
        description: ARN of the CodeBuild service role with permissions of an existing resource.
      codepipeline_service_role_arn:
        title: CodePipeline Service Role ARN
        type: string
        description: ARN of the CodePipeline service role with permissions of an existing resource.
      s3_bucket:
        title: S3 Bucket
        type: string
        description: Existing S3 bucket for the pipeline artifacts.
      owner:
        title: Owner
        type: string
        description: Owner of the component.
        ui:field: OwnerPicker
        ui:options:
          allowedKinds:
          - Group
  - title: Choose a location
    required:
    - repoUrl
    properties:
      repoUrl:
        title: Repository Location
        type: string
        ui:field: RepoUrlPicker
        ui:options:
          allowedHosts:
          - github.com
  steps:
  - id: template
    name: Fetch Skeleton + Template
    action: fetch:template
    input:
      url: ./skeleton
      copyWithoutRender:
      - .github/workflows/*
      values:
        default_branch: ${{parameters.default_branch}}
        codebuild_service_role_arn: ${{ parameters.codebuild_service_role_arn }}
        codepipeline_service_role_arn: ${{ parameters.codepipeline_service_role_arn }}
        s3_bucket: ${{ parameters.s3_bucket }}
        owner: ${{ parameters.owner }}
        destination: ${{ parameters.repoUrl | parseRepoUrl }}

  - id: publish
    name: Publish
    action: publish:github
    input:
      allowedHosts: ["github.com"]
      description: This is ${{ parameters.component_id }}
      repoUrl: ${{ parameters.repoUrl }}
      defaultBranch: ${{ parameters.default_branch }}

  output:
    links:
    - title: Repository
      url: ${{ steps.publish.output.remoteUrl }}
    - title: Open in catalog
      icon: catalog
      entityRef: ${{ steps.register.output.entityRef }}
