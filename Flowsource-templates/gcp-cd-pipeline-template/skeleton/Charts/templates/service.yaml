apiVersion: v1

kind: Service

metadata:
  name: {{ .Values.appName }}
  namespace: {{ .Values.namespace }}

spec:
  type: {{ .Values.service.type }}
  ports:
    - name: {{ .Values.service.portName }}
      port: {{ .Values.service.port }}
      protocol: {{ .Values.service.protocol }}
      targetPort: {{ .Values.service.targetPort }} 
  selector:
    app: {{ .Values.appName }}
