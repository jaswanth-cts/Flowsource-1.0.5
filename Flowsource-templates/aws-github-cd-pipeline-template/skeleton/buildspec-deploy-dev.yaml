version: 0.2

env:
  variables:
    CODEBUILD_ROLE_ARN: "${{values.code_build_arn}}"

phases:
  install:
    # runtime-versions:
    commands:
      # Installing Terraform
      - echo Installing Terraform...
      - curl -o terraform.zip https://releases.hashicorp.com/terraform/1.5.0/terraform_1.5.0_linux_amd64.zip
      - unzip terraform.zip
      - mv terraform /usr/local/bin/
      - terraform --version
      # Installing AWS CLI
      - apt-get update && apt-get install -y git python3 python3-pip
      - echo Installing AWS CLI
      - pip install awscli
      # AWS IAM Authenticator
      - echo Configuring AWS IAM Authenticator
      - curl -o aws-iam-authenticator https://s3.us-west-2.amazonaws.com/amazon-eks/1.21.2/2021-07-05/bin/linux/amd64/aws-iam-authenticator
      - chmod +x ./aws-iam-authenticator
      - mkdir -p $HOME/bin && cp ./aws-iam-authenticator $HOME/bin/aws-iam-authenticator && export PATH=$PATH:$HOME/bin

  pre_build:
    commands:
      - echo Initializing Terraform...
      - cd ./environments/dev # Change to the directory containing your Terraform configuration files
      - terraform init

  build:
    commands:
      - echo Planning Terraform changes...
      - terraform plan -out=tfplan

  post_build:
    commands:
      # Get AWS Credential using STS Assume Role for kubectl
      - echo "Setting Environment Variables related to AWS CLI for Kube Config Setup"          
      - CREDENTIALS=$(aws sts assume-role --role-arn $CODEBUILD_ROLE_ARN --role-session-name eks-codebuild --duration-seconds 900)
      - export AWS_ACCESS_KEY_ID="$(echo ${CREDENTIALS} | jq -r '.Credentials.AccessKeyId')"
      - export AWS_SECRET_ACCESS_KEY="$(echo ${CREDENTIALS} | jq -r '.Credentials.SecretAccessKey')"
      - export AWS_SESSION_TOKEN="$(echo ${CREDENTIALS} | jq -r '.Credentials.SessionToken')"
      - export AWS_EXPIRATION=$(echo ${CREDENTIALS} | jq -r '.Credentials.Expiration')
      - echo Applying Terraform changes...
      - terraform apply -auto-approve tfplan
