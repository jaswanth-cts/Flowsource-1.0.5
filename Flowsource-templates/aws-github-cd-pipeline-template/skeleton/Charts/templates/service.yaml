apiVersion: v1

kind: Service

metadata:
  name: {{ .Values.appName }}
  namespace: {{ .Values.namespace }}
  labels:
    app: {{ .Values.appName }}
  annotations:
    service.beta.kubernetes.io/aws-load-balancer-subnets: "{{ .Values.service.annotations.awsLoadBalancerSubnets }}"
    service.beta.kubernetes.io/aws-load-balancer-internal: "{{ .Values.service.annotations.awsLoadBalancerInternal }}"

spec:
  type: {{ .Values.service.type }}
  ports:
    - name: {{ .Values.service.portName }}
      port: {{ .Values.service.port }}
      protocol: {{ .Values.service.protocol }}
      targetPort: {{ .Values.service.targetPort }} 
  selector:
    app: {{ .Values.appName }}
