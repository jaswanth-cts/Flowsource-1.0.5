###############################################< Added For KUBERNETS START ###########################################################
kubernetes:
  serviceLocatorMethod:
    type: "multiTenant"
  clusterLocatorMethods:
    - type: "config"
      clusters:
        - name: ${K8S_EKS_CLUSTER_NAME}
          skipMetricsLookup: true
          skipTLSVerify: true
          url: ${K8S_EKS_CLUSTER_ENDPOINT}
          authProvider: "aws"
          caData: ${K8S_EKS_CA_DATA}
          authMetadata:
            kubernetes.io/x-k8s-aws-id: ${K8S_EKS_CLUSTER_NAME}
        - url: ${AKS_CLUSTER_URL}
          name: '${AKS_CLUSTER_NAME}'
          skipMetricsLookup: true
          skipTLSVerify: true
          subscriptionId: '${AKS_SUBSCRIPTION_ID}'
          resourceGroup: '${AKS_RESOURCE_GROUP}'
          clusterName: '${AKS_CLUSTER_NAME}'
          authProvider: 'serviceAccount'
          caData: ${AKS_CA_DATA}
          serviceAccountToken: ${AKS_SERVICE_ACCOUNT_TOKEN}
    # - type: "gke"
