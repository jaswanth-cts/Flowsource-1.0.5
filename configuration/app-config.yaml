app:
  title: Cognizant Flowsource
  baseUrl: ${FLOWSOURCE_BASE_URL}
  # To include appropriate sign in page (For having logic in App.tsx)
  signInAuthProvider: ${SIGN_IN_AUTH_PROVIDER} # For specific ProxiedSignInPage use "awsalb", "oauth2Proxy" and "gcp-iap". For SignInPage use any other value or undefined.
  datadogRum:
    clientToken: ${DATADOG_RUM_CLIENT_TOKEN}
    applicationId: ${DATADOG_RUM_APPLICATION_ID}
    site: ${DATADOG_RUM_SITE}
    env: ${DATADOG_RUM_ENV}
    sessionSampleRate: 100
    sessionReplaySampleRate: 20

organization:
  name: " "

permission:
  enabled: true

backend:
  # Used for enabling authentication, secret is shared by all backend plugins
  # See https://backstage.io/docs/auth/service-to-service-auth for
  # information on the format
  reading:
    allow:
      - host: '*.svc.cluster.local'
  auth:
    keys:
      - secret: ${BACKEND_SECRET}
    externalAccess:
      - type: static
        options:
          token: ${ROLE_RESTAPI_APIKEY}
          subject: roleMapping-access
        accessRestrictions:
          - plugin: flowsource-core
  baseUrl: ${FLOWSOURCE_BASE_URL}
  listen:
    port: 7007
    # Uncomment the following host directive to bind to specific interfaces
    # host: 127.0.0.1
  csp:
    upgrade-insecure-requests: false
    connect-src: ["'self'", 'http:', 'https:']
    frame-src: ["'self'", '${DASHBOARD_DOMAIN}', '${JIRA_BOT_URL}']
    # frame-src: 

    # Content-Security-Policy directives follow the Helmet format: https://helmetjs.github.io/#reference
    # Default Helmet Content-Security-Policy values can be removed by setting the key to false
    img-src:
    # "'self'" and 'data' are from the backstage default but must be set since img-src is overriden
    - "'self'"
    - 'data:'
    - 'blob:'
    # Allow your Jira instance for @roadiehq/backstage-plugin-jira
    - ${JIRA_TARGET}
  cors:
    origin: ${FLOWSOURCE_BASE_URL}
    methods: [GET, HEAD, PATCH, POST, PUT, DELETE]
    credentials: true

  # config options: https://node-postgres.com/api/client
  database:
    client: pg
    connection:
      host: ${POSTGRES_SERVICE_HOST}
      port: ${POSTGRES_SERVICE_PORT}
      user: ${POSTGRES_USER}
      password: ${POSTGRES_PASSWORD}
      # connection: ':memory:'
      # https://node-postgres.com/features/ssl
      # you can set the sslmode configuration option via the `PGSSLMODE` environment variable
      # see https://www.postgresql.org/docs/current/libpq-ssl.html Table 33.1. SSL Mode Descriptions (e.g. require)
      # ssl:
      #   ca: # if you have a CA file and want to verify it you can uncomment this section
      #     $file: <file-path>/ca/server.crt
 
 # workingDirectory: /tmp # Use this to configure a working directory for the scaffolder, defaults to the OS temp-dir

integrations:
  github:
    - host: github.com
      # This is a Personal Access Token or PAT from GitHub. You can find out how to generate this token, and more information
      # about setting up the GitHub integration here: https://backstage.io/docs/getting-started/configuration#setting-up-a-github-integration
      # Either use the below token or config under integration.github.apps: section for setting up the integrations with GitHub 
      token: ${INTEGRATIONS_GITHUB_TOKEN}

    ### Example for how to add your GitHub Enterprise instance using the API:
    # - host: ghe.example.net
    #   apiBaseUrl: https://ghe.example.net/api/v3
    #   token: ${GHE_TOKEN}
      # apps:
      #   - appId: ${INTEGRATIONS_GITHUB_APP_APP_ID}
      #     clientId: ${INTEGRATIONS_GITHUB_APP_CLIENT_ID}
      #     clientSecret: ${INTEGRATIONS_GITHUB_APP_CLIENT_SECRET}
      #     privateKey: ${INTEGRATIONS_GITHUB_APP_PRIVATE_KEY}
      #     webhookSecret: ${INTEGRATIONS_GITHUB_APP_WEBHOOK_SECRET}

  bitbucketCloud:
    - host: bitbucket.org
      token: ${BITBUCKET_TOKEN}
      username: ${BITBUCKET_CLOUD_APP_USERNAME}
      appPassword: ${BITBUCKET_CLOUD_APP_PASSWORD}
      apiBaseUrl: https://api.bitbucket.org/2.0/repositories/

  azure:
    - host: dev.azure.com
      credentials:
        # Either use personalAccessToken or servicePrinciple credentials for setting up the integrations with Azure DevOps
        # - organizations: 
        #     - ${AZURE_DEVOPS_ORGANIZATION}
        #   clientId: ${AZURE_SERVICE_PRINCIPLE_CLIENT_ID}
        #   clientSecret: ${AZURE_SERVICE_PRINICIPLE_CLIENT_SECRET}
        #   tenantId: ${AZURE_SERVICE_PRINCIPLE_TENANT_ID}
        - organizations:
            - ${AZURE_DEVOPS_ORGANIZATION}
          personalAccessToken: ${AZURE_DEVOPS_TOKEN}

  google:
  - type: ${GOOGLE_TYPE}
    project_id: ${GOOGLE_PROJECT_ID}
    private_key_id: ${GOOGLE_PRIVATE_KEY_ID}
    private_key: ${GOOGLE_PRIVATE_KEY}
    client_email: ${GOOGLE_CLIENT_EMAIL}
    client_id: ${GOOGLE_CLIENT_ID}
    auth_uri: ${GOOGLE_AUTH_URI}
    token_uri: ${GOOGLE_TOKEN_URI}
    auth_provider_x509_cert_url: ${GOOGLE_AUTH_PROVIDER_X509_CERT_URL}
    client_x509_cert_url: ${GOOGLE_CLIENT_X509_CERT_URL}
    universe_domain: ${GOOGLE_UNIVERSE_DOMAIN}
    gitToken: ${GIT_TOKEN}  
    github: ${GITHUB_ENABLED}
    triggerId: ${GIT_TRIGGER_ID}

#proxy:
  ### Example for how to add a proxy endpoint for the frontend.
  ### A typical reason to do this is to handle HTTPS and CORS for internal services.
  # endpoints:
  #   '/test':
  #     target: 'https://example.com'
  #     changeOrigin: true

# Reference documentation http://backstage.io/docs/features/techdocs/configuration
# Note: After experimenting with basic setup, use CI/CD to generate docs
# and an external cloud storage when deploying TechDocs for production use-case.
# https://backstage.io/docs/features/techdocs/how-to-guides#how-to-migrate-from-techdocs-basic-to-recommended-deployment-approach
techdocs:
  builder: 'local' # Alternatives - 'external'
  generator:
    runIn: 'local' # Alternatives - 'docker'
  publisher:
    # techdocs.publisher.type can be - 'local' or 'googleGcs' or 'awsS3' or 'azureBlobStorage'.
    # When set to 'local', techdocs-backend will create a 'static' directory at its root to store generated documentation files.
    # When set to 'googleGcs', techdocs-backend will use a Google Cloud Storage Bucket to store generated documentation files.
    # When set to 'awsS3', techdocs-backend will use an Amazon Web Service (AWS) S3 bucket to store generated documentation files.
    type: ${TECHDOCS_STORAGE_PROVIDER_TYPE}
    awsS3:
      # (Required) AWS S3 Bucket Name
      bucketName: ${S3_BUCKET_NAME}
      # (Optional) Location in storage bucket to save files
      # If not set, the default location will be the root of the storage bucket
      bucketRootPath: '/'

      # (Optional) AWS credentials to use to write to the storage bucket.
      # This configuration section is now deprecated.
      # Configuring the account ID is now preferred, with credentials in the 'aws' app config section.
      # If credentials are not set and no account ID is set, environment variables or aws config file will be used to authenticate.
      # https://www.npmjs.com/package/@aws-sdk/credential-provider-node
      # https://docs.aws.amazon.com/sdk-for-javascript/v3/developer-guide/setting-credentials-node.html
      credentials:
        accessKeyId: ${S3_AWS_ACCESS_KEY}
        secretAccessKey: ${S3_AWS_SECRET_KEY}

      # (Optional) AWS Region of the bucket.
      # If not set, AWS_REGION environment variable or aws config file will be used.
      # https://docs.aws.amazon.com/sdk-for-javascript/v3/developer-guide/setting-region.html
      region: ${S3_AWS_REGION}
    azureBlobStorage:
      # (Required) Azure Blob Storage Container Name
      containerName: ${TECHDOCS_STORAGE_CONTAINER_NAME}
      # (Required) An account name is required to write to a storage blob container.
      credentials:
        accountName: ${TECHDOCS_AZURE_BLOB_STORAGE_ACCOUNT_NAME}
        # (Optional) An account key is required to write to a storage container.
        # If missing,AZURE_TENANT_ID, AZURE_CLIENT_ID, AZURE_CLIENT_SECRET environment variable will be used.
        # https://docs.microsoft.com/en-us/azure/storage/common/storage-auth?toc=/azure/storage/blobs/toc.json
        accountKey: ${TECHDOCS_AZURE_BLOB_STORAGE_ACCOUNT_KEY}
    googleGcs:
      # (Required) Cloud Storage Bucket Name
      bucketName: '${GOOGLE_BUCKET_NAME}'
      # Location in storage bucket to save files
      # (Optional) Location in storage bucket to save files
      # If not set, the default location will be the root of the storage bucket
      bucketRootPath: '/'
      projectId: '${GOOGLE_PROJECT_ID}'
      # (Optional) An Authentication is required to write to a storage bucket.
      # GOOGLE_APPLICATION_CREDENTIALS environment variable will be used.
      credentials: '${GOOGLE_APPLICATION_CREDENTIALS}'


