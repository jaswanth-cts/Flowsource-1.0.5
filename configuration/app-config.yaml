catalog:
  import:
    entityFilename: catalog-info.yaml
    pullRequestBranchName: backstage-integration
  rules:
    - allow: [Component, System, API, Resource, Location, Environment]
  # See https://backstage.io/docs/features/software-catalog/#adding-components-to-the-catalog for more details
  # on how to get entities into the catalog.
  locations:
    # Local example data, file locations are relative to the backend process, typically `packages/backend`
    - type: file
      target: ../../examples/entities.yaml

    # Local example template
    - type: file
      target: ../../examples/template/template.yaml
      rules:
        - allow: [Template]

    # Local example organizational data
    - type: file
      target: ../../examples/org.yaml
      rules:
        - allow: [User, Group]

    ## Uncomment these lines to add more example data
    # - type: url
    #   target: https://github.com/backstage/backstage/blob/master/packages/catalog-model/examples/all.yaml

    # # Uncomment these lines to add an example org
    # - type: url
    #   target: https://github.com/backstage/backstage/blob/master/packages/catalog-model/examples/acme-corp.yaml
    #   rules:
    #     - allow: [User, Group]

    - type: file
      target: /app/configurations/all-configurations.yaml
      rules:
        - allow: [User, Group, Environment]
    # Remote template in a different repository
    - type: url
      target: https://github.com/TheCognizantFoundry/backstage-software-templates/blob/main/remote-template-demo.yaml
      rules:
        - allow: [Template]
  providers:
    azureDevOps:
      azureDevOpsProject: # identifies your dataset / provider independent of config changes
        organization: ${AZURE_DEVOPS_ORG}
        project: ${AZURE_DEVOPS_PROJECT}
        repository: ${AZURE_DEVOPS_REPOSITORY} # this will match all repos starting with service-*
        path: /catalog-info.yaml
        schedule: # optional; same options as in SchedulerServiceTaskScheduleDefinition
          # supports cron, ISO duration, "human duration" as used in code
          frequency: { minutes: 2 }
          # supports ISO duration, "human duration" as used in code
          timeout: { minutes: 3 }


