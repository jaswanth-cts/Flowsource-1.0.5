##############################################<Added For Github PR Cycle Time Integration START>#########################################################
githubPRCycleTime:
  PRCycleTimeMin: 8       # PR Raised to Merged
  PRCycleTimeMax: 9
  PRReviewCycleTimeMin: 3  # PR Raised to Approved
  PRReviewCycleTimeMax: 6
  PRMergeCycleTimeMin: 0  # PR Approved to Merged
  PRMergeCycleTimeMax: 1
##############################################<Added For Github PR Cycle Time Integration END>#########################################################
##############################################<Added wellArchitected Plugin Names START>#########################################################
wellArchitectedPlugins:  
  plugins: AWS Resilience Hub,AWS Fault Injection,Resilience4j,Datadog,Dynatrace,AppDynamics,SAST,Veracode Scan,Blackduck Scan,SCA,Infra Code Scan,Prisma Image Scan,Prisma Defender Host Scan,Prisma Defender Container Scan,DevopsGuru
###############################################<Added wellArchitected Plugin Names END>#########################################################  
pullRequestCycleTime:
  PRCycleTimeMin: 10       # PR Raised to Merged
  PRCycleTimeMax: 12
  PRReviewCycleTimeMin: 4  # PR Raised to Approved
  PRReviewCycleTimeMax: 7
  PRMergeCycleTimeMin: 1   # PR Approved to Merged
  PRMergeCycleTimeMax: 2
  ##############################################<Added For Blackduck Integration END>#########################################################
blackduck:
  blackduckAuthToken: ${BLACKDUCK_TOKEN}
  blackduckBaseUrl: ${BLACKDUCK_BASE_URL}
