  accounts: # Add any additional accounts here if needed
    - accountId: ${K8S_AWS_ACCOUNT_ID}
  awsCodePipeline:
    accessKeyId: ${CODEPIPELINE_ACCESS_KEY}
    secretAccessKey: ${CODEPIPELINE_SECRET} 
    roleArn: ${CODEPIPELINE_ROLE_ARN}
    region: ${CODEPIPELINE_REGION}
    enableTrigger: false  # By default, it will be false, if you want to enable it, set it to true
  accountDefaults:
