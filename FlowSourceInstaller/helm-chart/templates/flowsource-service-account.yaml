{{- if .Values.flowsource.flowsourceDeploy.serviceAccount.create -}}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ .Values.flowsource.flowsourceDeploy.serviceAccount.name }}
  namespace: {{ .Values.global.namespace }}
  labels:
    app: flowsource
  {{- with .Values.flowsource.flowsourceDeploy.serviceAccount.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
  {{- end }}